# Server
server.port=8081

# Salesforce Connected App
sf.client-id=${SF_CLIENT_ID}
sf.client-secret=${SF_CLIENT_SECRET}
sf.redirect-uri=${SF_REDIRECT_URI:http://localhost:8081/oauth2/callback}
sf.login-url=${SF_LOGIN_URL:https://login.salesforce.com}

# Frontend
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Session
server.servlet.session.timeout=86400s
spring.session.store-type=none

# CORS
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}
